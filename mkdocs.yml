site_name: pyfgs
repo_url: https://github.com/tomdstanton/pyfgs
site_url: https://tomdstanton.github.io/pyfgs
site_description: PyO3 bindings and Python interface to FragGeneScanRs, a gene prediction model for short and error-prone reads.
site_author: Tom Stanton
edit_uri: edit/main/docs/
repo_name: tomdstanton/pyfgs
copyright: Maintained by <a href="https://tomdstanton.com">tomdstanton</a>.
watch: [mkdocs.yml, README.md, python]

nav:
  - Home: index.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            show_root_heading: true
            show_source: false # Hide the 'source' button since it's just a stub file
            heading_level: 2
  - include-markdown

theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tomdstanton/pyfgs
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pyfgs

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - footnotes
