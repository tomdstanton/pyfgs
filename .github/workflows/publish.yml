name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  # 1. THE NEW GATEKEEPER JOB
  version-check:
    name: 🛡️ Enforce Version Sync
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # REQUIRED: Allows the OIDC token to be generated
      contents: read   # REQUIRED: Allows actions/checkout to read the repo
      
    steps:
      - uses: actions/checkout@v6

      - name: Assert Tag matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version =' Cargo.toml | head -n 1 | awk -F '"' '{print $2}')
          
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::🚨 Version Mismatch! GitHub Release tag is v$TAG_VERSION, but Cargo.toml says $CARGO_VERSION."
            exit 1
          fi
          echo "✅ Versions match (v$TAG_VERSION). Proceeding to build wheels!"

  # 2. YOUR EXISTING BUILD JOB
  build-wheels:
    name: Build Wheels
    needs: version-check # <--- ADD THIS LINE! This forces it to wait for the gatekeeper.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
