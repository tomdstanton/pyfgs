name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
      - 'python/pyfgs/**/*.py'
      - '.github/workflows/docs.yml'

# We need elevated permissions for the modern Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv pip install --system -e . --group docs

      - name: Bake Root Markdown Files into Docs
        run: |
          cp README.md docs/index.md
          cp CONTRIBUTING.md docs/contributing.md

      - name: Fetch Benchmark Dashboard
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: benchmark-data
          path: temp-benchmark-data

      - name: Build Zensical Site
        run: zensical build

      - name: Inject Benchmarks into Compiled Site
        run: |
          if [ -d "temp-benchmark-data/dev/bench" ]; then
            echo "Benchmark data found. Injecting into site..."
            mkdir -p site/benchmarks
            cp -r temp-benchmark-data/dev/bench/* site/benchmarks/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
