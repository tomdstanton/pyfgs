name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Pytest on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build and Test
        run: |
          uv venv
          source .venv/bin/activate
          
          # Install the package and all dev dependencies (including pytest and pytest-cov)
          uv pip install -e . --group dev
          
          # Run the test suite
          pytest -v tests/